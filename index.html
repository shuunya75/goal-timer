<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goal-timer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <header class="app-header">
        <p class="eyebrow">Plank / Workout Timer</p>
        <h1 id="app-title">goal-timer</h1>
      </header>

      <section class="time-settings" aria-label="時間設定">
        <div class="setting-group">
          <label class="setting-title" for="target-minutes">目標</label>
          <div class="time-inputs">
            <input id="target-minutes" type="number" min="0" max="999" inputmode="numeric" value="5" />
            <span>分</span>
            <input id="target-seconds" type="number" min="0" max="59" inputmode="numeric" value="0" />
            <span>秒</span>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-title" for="minimum-minutes">最低目標</label>
          <div class="time-inputs">
            <input id="minimum-minutes" type="number" min="0" max="999" inputmode="numeric" value="4" />
            <span>分</span>
            <input id="minimum-seconds" type="number" min="0" max="59" inputmode="numeric" value="30" />
            <span>秒</span>
          </div>
        </div>
      </section>

      <section class="timer-grid" aria-label="タイマー表示">
        <article class="metric">
          <p class="metric-label">目標</p>
          <p id="target-display" class="metric-value">05:00</p>
        </article>

        <article id="minimum-card" class="metric">
          <div class="metric-label-row">
            <p class="metric-label">最低目標</p>
            <span id="minimum-badge" class="badge" hidden>最低目標達成</span>
          </div>
          <p id="minimum-display" class="metric-value">04:30</p>
        </article>

        <article class="metric metric-primary">
          <p class="metric-label">経過時間</p>
          <p id="elapsed-display" class="metric-value">00:00</p>
        </article>

        <article id="remaining-card" class="metric">
          <p id="remaining-label" class="metric-label">残り時間</p>
          <p id="remaining-display" class="metric-value">05:00</p>
        </article>
      </section>

      <section class="controls" aria-label="操作">
        <button id="main-button" class="button button-primary" type="button">開始</button>
        <button id="reset-button" class="button button-secondary" type="button">リセット</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
